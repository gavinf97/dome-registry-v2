<!-- DOME Registry V2 — App Shell (V1 visual identity) -->
<div class="d-flex flex-column flex-nowrap vw-100 vh-100">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="d-block flex-grow-0">
    <nav class="navbar navbar-expand-sm navbar-dark bg-primary bg-gradient">
      <div class="container-fluid">

        <!-- Brand: SVG logo + name -->
        <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
          <img class="logo-sm" src="assets/logo-white-static.svg" alt="DOME logo">
          <span>DOME Registry</span>
        </a>

        <!-- Mobile toggle -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain"
                aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav links -->
        <div class="navbar-collapse collapse" id="navMain">
          <!-- Left -->
          <ul class="navbar-nav ms-0 me-auto">
            <li class="nav-item">
              <a class="nav-link" routerLink="/search" [routerLinkActive]="['active']">Browse</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/stats" [routerLinkActive]="['active']">Statistics</a>
            </li>
            <li class="nav-item" *ngIf="auth.isLoggedIn()">
              <a class="nav-link" routerLink="/registry/new" [routerLinkActive]="['active']">Submit</a>
            </li>
            <li class="nav-item" *ngIf="auth.isLoggedIn()">
              <a class="nav-link" routerLink="/upload" [routerLinkActive]="['active']">
                <i class="bi bi-robot me-1"></i>AI Import
              </a>
            </li>
            <li class="nav-item" *ngIf="auth.hasRole('journal_owner')">
              <a class="nav-link" routerLink="/journal-queue" [routerLinkActive]="['active']">
                <i class="bi bi-journal-check me-1"></i>Journal Queue
              </a>
            </li>
            <li class="nav-item" *ngIf="auth.hasRole('admin')">
              <a class="nav-link" routerLink="/admin" [routerLinkActive]="['active']">Admin</a>
            </li>
          </ul>

          <!-- Right: auth -->
          <ul class="navbar-nav ms-auto me-0">
            <ng-container *ngIf="!auth.isLoggedIn()">
              <!-- ORCID login -->
              <li class="nav-item">
                <button class="btn btn-orcid btn-sm d-flex align-items-center gap-1" (click)="auth.login()">
                  <img src="assets/orcid.svg" alt="ORCID" style="height:1.1rem;width:1.1rem;">
                  <span>Sign in with ORCID</span>
                </button>
              </li>
              <!-- Dev Login (dev only) -->
              <li class="nav-item ms-2">
                <button class="btn btn-outline-warning btn-sm" (click)="auth.devLogin()"
                        title="Dev login — no ORCID needed">
                  <i class="bi bi-bug me-1"></i>Dev Login
                </button>
              </li>
            </ng-container>

            <!-- Logged-in user dropdown -->
            <li class="nav-item dropdown" *ngIf="auth.isLoggedIn()">
              <a class="nav-link dropdown-toggle active" href="#" role="button"
                 data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle me-1 orcid-text"></i>
                {{ (auth.user$ | async)?.displayName || 'Profile' }}
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a class="dropdown-item">
                    <div class="small text-muted">
                      <i class="bi bi-person-circle orcid-text me-1"></i>
                      {{ (auth.user$ | async)?.orcid }}
                    </div>
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" routerLink="/profile"><i class="bi bi-person me-2"></i>My Profile</a></li>
                <li><a class="dropdown-item" routerLink="/registry/new"><i class="bi bi-plus-lg me-2"></i>New Entry</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <button class="dropdown-item text-danger" (click)="auth.logout()">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                  </button>
                </li>
              </ul>
            </li>
          </ul>
        </div>

      </div>
    </nav>
  </header>

  <!-- ── Main content (scrollable) ──────────────────────────────────── -->
  <main class="d-block flex-grow-1 overflow-auto">
    <router-outlet></router-outlet>
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <footer class="d-block flex-grow-0">
    <div class="d-flex flex-row align-items-center bg-primary bg-gradient text-white py-2 px-3">
      <span class="d-inline me-auto">
        <span class="d-none d-sm-inline small me-1">Supported by</span>
        <a href="https://elixir-europe.org/" target="_blank" rel="noopener" title="ELIXIR Europe">
          <img class="logo-sm" src="assets/elixir.svg" alt="ELIXIR">
        </a>
      </span>
      <span class="d-inline small">
        <span class="d-none d-sm-inline">Developed and maintained by&nbsp;</span>
        <a href="https://github.com/BioComputingUP" class="text-white" target="_blank" rel="noopener">
          BioCompUP&nbsp;<i class="bi bi-github"></i>
        </a>
        &nbsp;&mdash;&nbsp;
        <a href="https://dome-ml.org" class="text-white" target="_blank" rel="noopener">dome-ml.org</a>
      </span>
    </div>
  </footer>

</div>
