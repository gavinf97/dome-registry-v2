include:
  - docker-compose.yml

services:
  # Override backend for hot-reload in dev
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    environment:
      NODE_ENV: development
      COPILOT_TIMEOUT_MS: 900000   # 15 min — allows 22 subsection calls × ~30s each
    volumes:
      - ./backend/src:/app/src:ro
      - ./schema:/app/schema:ro
    ports:
      - "3000:3000"
    command: ["npm", "run", "start:dev"]

  # Override copilot for hot-reload in dev
  copilot:
    build:
      context: ./copilot
      dockerfile: Dockerfile.dev
    environment:
      LLM_MODE: local
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_TIMEOUT_MS: 180000    # 3 min per individual LLM call
    volumes:
      - ./copilot/app:/app/app:ro
      - ./copilot/dome_copilot:/app/dome_copilot:ro
    networks:
      - copilot-net
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Disable nginx in dev — frontend is served directly on :4200, backend on :3000
  nginx:
    profiles: ["prod"]

  # Local LLM — Gemma 4 via Ollama
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - copilot-net
    # Pull the model on startup; || true means container keeps running even if pull fails
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull ${OLLAMA_MODEL:-gemma3:4b} || echo '⚠ Model pull failed — check internet/DNS, Copilot will not work until model is available' && wait"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # MongoDB admin UI — dev only
  mongo-express:
    image: mongo-express:1
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: devpassword
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - db-net

  # Expose backend port directly in dev (bypasses nginx)
  # (already merged into the backend override above, port listed there)

  # Angular dev server with hot-reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:ro
    ports:
      - "4200:4200"
    networks:
      - public-net

volumes:
  ollama-data:
