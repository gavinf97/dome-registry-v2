services:
  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: dome-registry-v2
    networks:
      - db-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS API) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - public-net
      - db-net
      - copilot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── DOME Copilot (Python FastAPI) ───────────────────────────────────────
  copilot:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LLM_MODE: ${LLM_MODE:-api}
    # No ports exposed — only reachable from backend via copilot-net
    networks:
      - copilot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Frontend (Angular → nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - public-net

  # ─── Nginx reverse proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - public-net

volumes:
  mongo-data:

networks:
  public-net:
    driver: bridge
  db-net:
    driver: bridge
    internal: true
  copilot-net:
    driver: bridge
    internal: true
